<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SB Vanilla Chads</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
    <script src="westeros-data.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0d1117;
            --nav-bg: #10161e;
            --card: #161b22;
            --card-hover: #1c2330;
            --border: #21262d;
            --border2: #2d333b;
            --text: #e6edf3;
            --muted: #7d8590;
            --muted2: #8b949e;
            --gold: #d4a017;
            --silver: #8b949e;
            --bronze: #c17f24;
            --green: #3fb950;
            --red: #f85149;
            --blue: #58a6ff;
            --purple: #a371f7;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image:
                radial-gradient(ellipse 80% 50% at 50% -20%, rgba(88,166,255,0.06), transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(93,189,58,0.04), transparent);
        }

        /* ─── NAV ─── */
        nav {
            position: sticky;
            top: 0;
            z-index: 200;
            background: rgba(16, 22, 30, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            height: 62px;
            display: flex;
            align-items: center;
            padding: 0 28px;
            gap: 24px;
        }

        .logo {
            font-family: 'Press Start 2P', monospace;
            font-size: 13px;
            line-height: 1.4;
            color: #5dbd3a;
            text-shadow: 0 0 24px rgba(93,189,58,0.35), 2px 2px 0 #2d5c1a;
            cursor: default;
            user-select: none;
            white-space: nowrap;
        }
        .logo em { color: #f0a500; font-style: normal; }

        .nav-divider { flex: 1; }

        .search-wrap {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-wrap svg {
            position: absolute;
            left: 11px;
            color: var(--muted);
            pointer-events: none;
            flex-shrink: 0;
        }
        #searchInput {
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border2);
            border-radius: 9px;
            padding: 9px 14px 9px 36px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            width: 230px;
            outline: none;
            transition: border-color .2s, background .2s;
        }
        #searchInput:focus { border-color: var(--blue); background: rgba(88,166,255,0.06); }
        #searchInput::placeholder { color: var(--muted); }

        /* ─── MAIN ─── */
        main {
            max-width: 820px;
            margin: 0 auto;
            padding: 44px 20px 80px;
        }

        .page-title {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }
        .page-title h1 { font-size: 20px; font-weight: 800; letter-spacing: -.3px; }

        .page-subtitle {
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 28px;
        }

        /* ─── PLAYER ROWS ─── */
        #rankingsList { display: flex; flex-direction: column; gap: 7px; }

        .player-row {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 13px;
            padding: 14px 18px;
            display: flex;
            align-items: center;
            gap: 14px;
            cursor: pointer;
            transition: background .15s, border-color .15s, transform .15s, box-shadow .15s;
            animation: fadeIn .25s ease both;
        }
        .player-row:hover {
            background: var(--card-hover);
            border-color: var(--border2);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .player-row.rank-1 {
            border-color: rgba(212,160,23,.45);
            background: linear-gradient(110deg, rgba(212,160,23,.09) 0%, var(--card) 60%);
        }
        .player-row.rank-1:hover { background: linear-gradient(110deg, rgba(212,160,23,.14) 0%, var(--card-hover) 60%); }

        .player-row.rank-2 {
            border-color: rgba(180,195,215,.45);
            background: linear-gradient(110deg, rgba(180,195,215,.11) 0%, var(--card) 60%);
        }
        .player-row.rank-2:hover { background: linear-gradient(110deg, rgba(180,195,215,.17) 0%, var(--card-hover) 60%); }

        .player-row.rank-3 {
            border-color: rgba(193,127,36,.35);
            background: linear-gradient(110deg, rgba(193,127,36,.08) 0%, var(--card) 60%);
        }
        .player-row.rank-3:hover { background: linear-gradient(110deg, rgba(193,127,36,.14) 0%, var(--card-hover) 60%); }

        /* rank badge */
        .rank-badge {
            width: 40px;
            height: 40px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 16px;
            flex-shrink: 0;
            background: rgba(255,255,255,.05);
            color: var(--muted2);
            border: 1px solid var(--border2);
        }
        .rank-badge.gold   { background: linear-gradient(145deg, #f5c842, #c8860a); color: #fff; border-color: transparent; box-shadow: 0 0 18px rgba(212,160,23,.5); font-size: 18px; }
        .rank-badge.silver { background: linear-gradient(145deg, #d4dae2, #7e8d9e); color: #fff; border-color: transparent; box-shadow: 0 0 16px rgba(180,195,210,.4); font-size: 18px; }
        .rank-badge.bronze { background: linear-gradient(145deg, #e0964a, #a05e18); color: #fff; border-color: transparent; box-shadow: 0 0 14px rgba(193,127,36,.4); font-size: 18px; }

        /* avatar */
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            flex-shrink: 0;
            image-rendering: pixelated;
            background: #21262d;
            border: 1px solid var(--border2);
        }

        /* player info */
        .player-info { flex: 1; min-width: 0; }

        .name-row {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 7px;
            margin-bottom: 3px;
        }
        .player-name {
            font-size: 16px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-tag {
            font-size: 9.5px;
            font-weight: 700;
            padding: 2px 7px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: .6px;
            white-space: nowrap;
            flex-shrink: 0;
        }
        .player-sub {
            font-size: 12.5px;
            color: var(--muted2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .player-sub em { opacity: .7; font-style: italic; }

        /* points */
        .player-points {
            text-align: right;
            flex-shrink: 0;
        }
        .player-points .pts-val {
            font-size: 15px;
            font-weight: 700;
            display: block;
            color: var(--text);
        }
        .player-points .pts-label {
            font-size: 10.5px;
            color: var(--muted);
        }

        /* change */
        .change-badge {
            display: flex;
            align-items: center;
            gap: 3px;
            font-size: 12.5px;
            font-weight: 700;
            padding: 5px 10px;
            border-radius: 8px;
            flex-shrink: 0;
            min-width: 54px;
            justify-content: center;
        }
        .ch-up   { background: rgba(63,185,80,.12);  color: var(--green); }
        .ch-down { background: rgba(248,81,73,.12);  color: var(--red);   }
        .ch-same { background: rgba(125,133,144,.08); color: var(--muted); }

        .row-arrow { color: var(--muted); flex-shrink: 0; }

        /* ─── MODALS ─── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.72);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 500;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
        }
        .overlay.open { opacity: 1; pointer-events: all; }

        .modal {
            background: #161b22;
            border: 1px solid var(--border2);
            border-radius: 16px;
            padding: 26px 28px;
            width: 100%;
            max-width: 500px;
            max-height: 92vh;
            overflow-y: auto;
            transform: translateY(12px) scale(.97);
            transition: transform .2s;
        }
        .overlay.open .modal { transform: translateY(0) scale(1); }

        .modal-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 22px;
        }
        .modal-head h2 { font-size: 17px; font-weight: 700; }
        .close-btn {
            background: none;
            border: none;
            color: var(--muted);
            cursor: pointer;
            font-size: 19px;
            line-height: 1;
            padding: 2px;
            transition: color .15s;
        }
        .close-btn:hover { color: var(--text); }

        /* detail */
        .detail-flex { display: flex; gap: 22px; align-items: flex-start; }
        .detail-skin { flex-shrink: 0; text-align: center; }
        .detail-skin-label { font-size: 11px; color: var(--muted); margin-top: 6px; }

        .detail-right { flex: 1; }
        .detail-rank-label { font-size: 11.5px; color: var(--muted); margin-bottom: 4px; }
        .detail-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .detail-sub { font-size: 13px; color: var(--muted2); margin-bottom: 18px; }

        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stat-box { background: var(--bg); border: 1px solid var(--border); border-radius: 9px; padding: 12px; }
        .stat-lbl { font-size: 10.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
        .stat-val { font-size: 17px; font-weight: 700; }

        /* forms */
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 12.5px; color: var(--muted2); font-weight: 500; margin-bottom: 6px; }
        .form-group input, .form-group select {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border2);
            border-radius: 8px;
            padding: 9px 13px;
            color: var(--text);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            outline: none;
            transition: border-color .2s;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--blue); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        /* buttons */
        .btn {
            padding: 9px 18px;
            border-radius: 8px;
            border: none;
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity .15s, transform .1s, background .15s;
        }
        .btn:active { transform: scale(.96); }
        .btn-primary { background: var(--blue); color: #fff; }
        .btn-primary:hover { opacity: .88; }
        .btn-success { background: var(--green); color: #fff; }
        .btn-success:hover { opacity: .88; }
        .btn-danger { background: var(--red); color: #fff; }
        .btn-danger:hover { opacity: .88; }
        .btn-ghost { background: transparent; border: 1px solid var(--border2); color: var(--text); }
        .btn-ghost:hover { background: var(--card-hover); }
        .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }

        /* admin list */
        .admin-list { display: flex; flex-direction: column; gap: 7px; max-height: 380px; overflow-y: auto; padding-right: 4px; }
        .admin-item {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 9px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .admin-rank { width: 22px; text-align: center; font-weight: 700; color: var(--muted); font-size: 13px; flex-shrink: 0; }
        .admin-av { width: 30px; height: 30px; border-radius: 4px; image-rendering: pixelated; flex-shrink: 0; }
        .admin-info { flex: 1; min-width: 0; }
        .admin-name { font-weight: 600; font-size: 13.5px; }
        .admin-title { font-size: 11px; color: var(--muted); }
        .admin-btns { display: flex; gap: 5px; flex-shrink: 0; }
        .ic-btn {
            background: none;
            border: 1px solid var(--border2);
            border-radius: 6px;
            padding: 4px 7px;
            color: var(--muted2);
            cursor: pointer;
            font-size: 12px;
            transition: all .15s;
        }
        .ic-btn:hover { border-color: var(--blue); color: var(--blue); }
        .ic-btn.del:hover { border-color: var(--red); color: var(--red); }
        .ic-btn:disabled { opacity: .3; cursor: default; }
        .ic-btn:disabled:hover { border-color: var(--border2); color: var(--muted2); }

        /* admin login */
        .admin-login-wrap { text-align: center; padding: 10px 0 4px; }
        .admin-login-wrap p { font-size: 13px; color: var(--muted); margin-bottom: 16px; }
        #adminErr { color: var(--red); font-size: 12.5px; margin-top: 8px; min-height: 18px; }

        /* admin header row */
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .admin-header h3 { font-size: 14px; font-weight: 600; color: var(--muted2); }

        /* no results */
        .no-res { text-align: center; padding: 50px 20px; color: var(--muted); font-size: 13.5px; }

        /* admin fab */
        .fab {
            position: fixed;
            bottom: 22px;
            right: 22px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--card);
            border: 1px solid var(--border2);
            color: var(--muted);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all .2s;
            z-index: 100;
        }
        .fab:hover { border-color: var(--blue); color: var(--blue); box-shadow: 0 0 18px rgba(88,166,255,.2); }

        /* ─── NAV TABS ─── */
        .nav-tabs { display: flex; gap: 3px; }
        .nav-tab {
            background: transparent;
            border: none;
            border-radius: 9px;
            padding: 7px 15px;
            color: var(--muted);
            font-family: 'Inter', sans-serif;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all .15s;
        }
        .nav-tab:hover { background: var(--card); color: var(--text); }
        .nav-tab.active { background: var(--card-hover); color: var(--text); }

        /* ─── WIDGETS ─── */
        .widgets-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 22px; }
        .widget { background: var(--card); border: 1px solid var(--border); border-radius: 13px; padding: 18px 20px; }
        .widget-title { font-size: 13px; font-weight: 700; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }
        .widget-title.green { color: var(--green); }
        .widget-title.red   { color: var(--red);   }
        .widget-entry { display: flex; align-items: center; gap: 10px; padding: 7px 0; border-bottom: 1px solid var(--border); }
        .widget-entry:last-child { border-bottom: none; }
        .widget-rank { font-size: 12px; color: var(--muted); min-width: 28px; flex-shrink: 0; }
        .widget-av { width: 26px; height: 26px; border-radius: 4px; image-rendering: pixelated; flex-shrink: 0; }
        .widget-name { flex: 1; font-size: 13.5px; font-weight: 600; }
        .widget-badge { font-size: 12px; font-weight: 700; padding: 3px 9px; border-radius: 6px; flex-shrink: 0; }
        .widget-badge.up   { background: rgba(63,185,80,.12);  color: var(--green); }
        .widget-badge.down { background: rgba(248,81,73,.12);  color: var(--red);   }
        .widget-empty { font-size: 12.5px; color: var(--muted); }

        /* ─── PROFILE PAGE ─── */
        .profile-back { display:flex;align-items:center;gap:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;padding:0;margin-bottom:28px;transition:color .15s; }
        .profile-back:hover { color:var(--text); }
        .profile-header { display:flex;gap:26px;align-items:flex-start;margin-bottom:30px; }
        .profile-avatar-wrap { position:relative;flex-shrink:0;width:110px;height:210px; }
        .profile-avatar { width:100%;height:100%;border-radius:14px;image-rendering:pixelated;display:block;background:var(--card-hover);border:1px solid var(--border2);object-fit:contain; }
        .profile-rank-ovl { position:absolute;bottom:-10px;right:-14px;width:46px;height:46px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:17px;border:2px solid var(--bg); }
        .profile-rank-ovl.gold   { background:linear-gradient(145deg,#f5c842,#c8860a);color:#fff; }
        .profile-rank-ovl.silver { background:linear-gradient(145deg,#d4dae2,#7e8d9e);color:#fff; }
        .profile-rank-ovl.bronze { background:linear-gradient(145deg,#e0964a,#a05e18);color:#fff; }
        .profile-rank-ovl.def    { background:#21262d;color:var(--muted2);font-size:14px; }
        .profile-name-row { display:flex;align-items:center;gap:10px;margin-bottom:6px;flex-wrap:wrap; }
        .profile-name  { font-size:28px;font-weight:800;letter-spacing:-.4px; }
        .profile-sub   { font-size:14px;color:var(--muted2);margin-bottom:14px; }
        .profile-attrs { display:flex;flex-wrap:wrap;gap:6px; }
        .attr-tag { font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:5px;border:1px solid;white-space:nowrap; }

        .profile-tabs { display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px; }
        .profile-tab { background:none;border:none;border-bottom:2px solid transparent;margin-bottom:-1px;padding:10px 16px;font-family:'Inter',sans-serif;font-size:13.5px;font-weight:600;color:var(--muted);cursor:pointer;display:flex;align-items:center;gap:7px;transition:color .15s,border-color .15s; }
        .profile-tab:hover { color:var(--text); }
        .profile-tab.active { color:var(--text);border-bottom-color:var(--blue); }

        .profile-section { background:var(--card);border:1px solid var(--border);border-radius:13px;padding:22px 24px; }
        .profile-section h3 { font-size:15px;font-weight:700;margin-bottom:14px; }
        .profile-bio { font-size:14px;color:var(--muted2);line-height:1.8;white-space:pre-wrap; }
        .profile-bio-empty { font-size:14px;color:var(--muted);font-style:italic; }

        /* ─── NEWS ─── */
        .news-grid { display: flex; flex-direction: column; gap: 12px; }
        .news-card { background: var(--card); border: 1px solid var(--border); border-radius: 13px; padding: 22px 24px; transition: border-color .15s, transform .15s; }
        .news-card:hover { border-color: var(--border2); transform: translateY(-1px); }
        .news-meta { font-size: 11.5px; color: var(--muted); margin-bottom: 8px; }
        .news-title { font-size: 18px; font-weight: 800; margin-bottom: 10px; letter-spacing: -.2px; }
        .news-body { font-size: 13.5px; color: var(--muted2); line-height: 1.7; white-space: pre-wrap; }

        /* scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

        @keyframes fadeIn      { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
        @keyframes fadeUp      { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
        @keyframes slideRight  { from{opacity:0;transform:translateX(36px)} to{opacity:1;transform:translateX(0)} }

        /* ─── MAP ─── */
        .map-view-wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }
        .map-layout { display: flex; gap: 24px; align-items: flex-start; }
        .map-svg-wrap { flex: 1; background: #07101a; border-radius: 18px; border: 1px solid var(--border); overflow: hidden; position: relative; min-width: 0; }
        .map-legend { width: 210px; flex-shrink: 0; }
        .map-legend-card { background: var(--card); border: 1px solid var(--border); border-radius: 13px; padding: 14px 16px; }
        .map-legend-title { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 10px; }
        .map-legend-item { display: flex; align-items: center; gap: 9px; padding: 6px 7px; border-radius: 8px; cursor: pointer; transition: background .15s; margin-bottom: 2px; }
        .map-legend-item:hover { background: var(--card-hover); }
        .map-legend-dot { width: 9px; height: 9px; border-radius: 3px; flex-shrink: 0; }
        .map-legend-txt { flex: 1; min-width: 0; }
        .map-legend-name { font-size: 12.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .map-legend-sub  { font-size: 11px; color: var(--muted); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .map-legend-sub.assigned { color: var(--blue); }

        /* Region popup */
        .region-popup { position: fixed; background: #161b22; border: 1px solid #2d333b; border-radius: 16px; padding: 22px; width: 272px; z-index: 9998; box-shadow: 0 20px 60px rgba(0,0,0,.85); display: none; }
        .rp-close { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; line-height: 1; padding: 5px; transition: color .15s; border-radius: 6px; }
        .rp-close:hover { color: var(--text); background: var(--card-hover); }
        .rp-house { font-size: 10.5px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: .07em; margin-bottom: 4px; }

// Merge default region data with admin overrides
function getRegionData(id) {
    const base   = MAP_REGIONS.find(r => r.id === id);
    if (!base) return null;
    const custom = regionCustom[id] || {};
    const color  = custom.color || base.color;
    // Derive hover/stroke from custom color if set
    const hoverColor  = custom.color ? _shiftColor(custom.color, 1.35) : base.hoverColor;
    const strokeColor = custom.color ? _shiftColor(custom.color, 2.8)  : base.strokeColor;
    return { ...base, house: custom.house ?? base.house, capital: custom.capital ?? base.capital, color, hoverColor, strokeColor };
}

function _shiftColor(hex, factor) {
    const clamp = v => Math.min(255, Math.max(0, Math.round(v)));
    const r = clamp(parseInt(hex.slice(1,3),16) * factor);
    const g = clamp(parseInt(hex.slice(3,5),16) * factor);
    const b = clamp(parseInt(hex.slice(5,7),16) * factor);
    return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function saveRegionsConfig() { db.ref('mapData/regionsConfig').set(regionCustom); }
function saveHouseLeaders()  { db.ref('mapData/houseLeaders').set(houseLeaders); }

function updateRegionColors() {
    if (!_mapSvgEl) return;
    MAP_REGIONS.forEach(region => {
        const r     = getRegionData(region.id);
        const svgId = SVG_ID_MAP[region.id];
        const el    = _mapSvgEl ? _mapSvgEl.querySelector('#' + svgId) : null;
        if (!el) return;
        const paths = el.tagName.toLowerCase() === 'g' ? el.querySelectorAll('path') : [el];
        paths.forEach(p => { p.style.fill = r.color; });
    });
    buildMapLegend();
}

db.ref('/').on('value', snap => {
    const d = snap.val();
    if (!d || (!d.players && !d.news)) {
        players = deepClone(DEFAULTS);
        news    = deepClone(DEFAULT_NEWS);
        db.ref('players').set(players);
        db.ref('news').set(news);
        render();
        return;
    }
    players = toArr(d.players);
    news    = toArr(d.news);
    mapData  = d.mapData  || {};
    cityData = (d.mapData && d.mapData.cities) || {};
    if (d.mapData && d.mapData.citiesConfig) {
        MAP_CITIES = Array.isArray(d.mapData.citiesConfig)
            ? d.mapData.citiesConfig.filter(Boolean)
            : Object.values(d.mapData.citiesConfig).filter(Boolean);
    }
    if (d.mapData && d.mapData.regionsConfig) {
        regionCustom = d.mapData.regionsConfig;
    }
    if (d.mapData && d.mapData.houseLeaders) {
        houseLeaders = d.mapData.houseLeaders;
    }
    if (document.querySelector('.overlay.open')) return;
    render();
    if (document.getElementById('newsView').style.display !== 'none') renderNews();
    if (document.getElementById('profileView').style.display !== 'none' && currentProfileId) {
        openDetail(currentProfileId);
    }
    if (document.getElementById('mapView').style.display !== 'none') renderMap();
});

function deepClone(x) { return JSON.parse(JSON.stringify(x)); }
function nextId()     { return players.length ? Math.max(...players.map(p=>p.id)) + 1 : 1; }
function nextNewsId() { return news.length    ? Math.max(...news.map(n=>n.id))    + 1 : 1; }

// сортировка по очкам — единственный источник истины для ранга
function getSorted() { return [...players].sort((a, b) => b.points - a.points); }
function getRank(id) { return getSorted().findIndex(p => p.id === id) + 1; }

// ═══════════════ RENDER ═══════════════

function render(q = '') {
    const list   = document.getElementById('rankingsList');
    const sub    = document.getElementById('pageSubtitle');
    const sorted = getSorted();

    let view = q
        ? sorted.filter(p => p.username.toLowerCase().includes(q.toLowerCase()) ||
                              p.title.toLowerCase().includes(q.toLowerCase()))
        : sorted;

    sub.textContent = q
        ? `Найдено: ${view.length} из ${players.length}`
        : `Всего чадов на сервере: ${players.length}`;

    renderWidgets();

    if (!view.length) {
        list.innerHTML = '<div class="no-res">Никого не найдено 🔍</div>';
        return;
    }

    list.innerHTML = view.map((p, vi) => {
        const rank   = sorted.indexOf(p) + 1;
        const rClass = rank === 1 ? 'rank-1' : rank === 2 ? 'rank-2' : rank === 3 ? 'rank-3' : '';
        const bClass = rank === 1 ? 'gold'   : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';

        const chHTML = p.change > 0
            ? `<div class="change-badge ch-up">↑ +${p.change}</div>`
            : p.change < 0
            ? `<div class="change-badge ch-down">↓ ${p.change}</div>`
            : `<div class="change-badge ch-same">— 0</div>`;

        const tagHTML = p.tag
            ? `<span class="player-tag" style="background:${p.tagColor}22;color:${p.tagColor};border:1px solid ${p.tagColor}44">${p.tag}</span>`
            : '';

        return `
        <div class="player-row ${rClass}" onclick="openDetail(${p.id})" style="animation-delay:${vi*0.04}s">
            <div class="rank-badge ${bClass}">${rank}</div>
            <img class="avatar"
                 src="https://mc-heads.net/avatar/${enc(p.username)}/50"
                 onerror="this.onerror=null;this.src='https://minotar.net/helm/${enc(p.username)}/50'"
                 alt="${enc(p.username)}">
            <div class="player-info">
                <div class="name-row">
                    <span class="player-name">${esc(p.username)}</span>
                    ${tagHTML}
                </div>
                <div class="player-sub">${esc(p.title)} · <em>${esc(p.subtitle)}</em></div>
            </div>
            <div class="player-points">
                <span class="pts-val">${p.points.toLocaleString('ru')}</span>
                <span class="pts-label">очков</span>
            </div>
            ${chHTML}
            <svg class="row-arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m9 18 6-6-6-6"/></svg>
        </div>`;
    }).join('');
}

let currentRankTab = 'players';

function switchRankTab(tab, btn) {
    currentRankTab = tab;
    document.querySelectorAll('.rtab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    const sw = document.getElementById('searchWrap');
    sw.style.visibility    = tab === 'players' ? '' : 'hidden';

    if (tab === 'players')  { render(); }
    if (tab === 'houses')   { renderHousesRanking(); }
    if (tab === 'factions') { renderFactionsRanking(); }
    // Fade-in animation for the list
    const list = document.getElementById('rankingsList');
    list.style.animation = 'none'; void list.offsetWidth;
    list.style.animation = 'fadeUp .28s ease both';
}

function closeEntityDetail() {
    switchView('rankings');
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'rankings'));
    const tabBtn = document.getElementById('rtab-' + currentEntityTab);
    if (tabBtn) switchRankTab(currentEntityTab, tabBtn);
}

// ── House helpers ─────────────────────────────────────────────────────────────
function buildHouseStats() {
    const sorted = getSorted();
    const map = {};
    players.forEach(p => {
        if (!p.house) return;
        const key = p.house.trim();
        if (!map[key]) map[key] = { name: key, factionId: p.factionId || null, members: [], total: 0 };
        map[key].members.push(p);
        map[key].total += p.points || 0;
    });
    // Sort members by points within each house
    Object.values(map).forEach(h => h.members.sort((a,b)=>(b.points||0)-(a.points||0)));
    return Object.values(map).sort((a,b) => b.total - a.total);
}

function getHouseHoldings(memberIds) {
    const set = new Set(memberIds.map(Number));
    const h = [];
    MAP_REGIONS.forEach(r => {
        if (set.has(Number(mapData[r.id]))) {
            const rd = getRegionData(r.id);
            h.push({ label: rd.emoji + ' ' + rd.name, type: 'region', id: r.id });
        }
    });
    MAP_CITIES.forEach(c => {
        if (set.has(Number(cityData[c.id])))
            h.push({ label: (c.isCapital ? '👑' : '🏙') + ' ' + c.name, type: 'city', id: c.id });
    });
    return h;
}

function renderHousesRanking() {
    const list   = document.getElementById('rankingsList');
    const houses = buildHouseStats();

    if (!houses.length) {
        list.innerHTML = `<div class="no-res">Дома появятся после назначения игрокам поля «Дом» в профиле</div>`;

// ── Faction ranking ───────────────────────────────────────────────────────────
function buildFactionStats() {
    const sorted = getSorted();
    const houses = buildHouseStats();
    return MAP_REGIONS.map(region => {
        const rd       = getRegionData(region.id);
        const members  = players.filter(p => p.factionId === region.id);
        const total    = members.reduce((s,p)=>s+(p.points||0),0);
        const fHouses  = houses.filter(h=>h.factionId===region.id);
        const leader   = mapData[region.id] ? players.find(p=>p.id==mapData[region.id]) : null;
        const lrank    = leader ? sorted.indexOf(leader)+1 : null;
        const holdings = [];
        MAP_CITIES.forEach(c => {
            if (cityData[c.id] && members.some(m=>m.id==cityData[c.id]))
                holdings.push({ label: (c.isCapital?'👑':'🏙')+' '+c.name, type:'city', id: c.id });
        });
        return { region, rd, members, total, fHouses, leader, lrank, holdings };
    }).sort((a,b)=>b.total-a.total);
}

function renderFactionsRanking() {
    const list     = document.getElementById('rankingsList');
    const factions = buildFactionStats();

    const anyData = factions.some(f=>f.members.length>0);
    if (!anyData) {
        list.innerHTML = `<div class="no-res">Назначьте игрокам фракцию в профиле</div>`;
        return;
    }

    list.innerHTML = factions.map((f, idx) => {
        const rank   = idx + 1;
        const bClass = rank===1?'gold':rank===2?'silver':rank===3?'bronze':'';
        const rClass = rank===1?'rank-1':rank===2?'rank-2':rank===3?'rank-3':'';

        return `<div class="player-row ${rClass}" onclick="openFactionDetail('${f.region.id}')" style="animation-delay:${idx*0.04}s">
            <div class="rank-badge ${bClass}">${rank}</div>
            <div style="font-size:30px;flex-shrink:0;width:50px;text-align:center">${f.rd.emoji}</div>
            <div class="player-info">
                <div class="name-row">
                    <span class="player-name">${esc(f.rd.name)}</span>
                </div>
                <div class="player-sub">${esc(f.rd.house)} · ${f.fHouses.length} домов · ${f.members.length} участников${f.leader ? ' · ⚔️ ' + esc(f.leader.username) : ''}</div>
            </div>
            <div class="player-points">
                <span class="pts-val">${Number(f.total).toLocaleString('ru')}</span>
                <span class="pts-label">очков</span>
            </div>
            <svg class="row-arrow" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="m9 18 6-6-6-6"/></svg>
        </div>`;
    }).join('');
}

// ══════════════ PLAYER ROLE HELPERS ══════════════

function getPlayerLeaderRoles(playerId) {
    const roles = [];
    MAP_REGIONS.forEach(r => {
        if (mapData[r.id] == playerId) {
            const rd = getRegionData(r.id);
            roles.push({ icon: rd.emoji, label: 'Лидер фракции', name: rd.name, type: 'region', id: r.id });
        }
    });
    MAP_CITIES.forEach(c => {
        if (cityData[c.id] == playerId) {
            // Capital city leader = same as faction leader, already shown
            if (!c.isCapital) roles.push({ icon: '🏙', label: 'Лидер города', name: c.name, type: 'city', id: c.id });
        }
    });
    return roles;
}

const RP_TIER_COLORS = ['', '#f5c842', '#3fb950', '#58a6ff', '#f0a500', '#f85149'];

function rpTierBadge(tier) {
    if (!tier) return '';

    return `<span title="RP Tier ${t}: ${RP_TIER_LABELS[t]}" style="background:${RP_TIER_COLORS[t]}22;color:${RP_TIER_COLORS[t]};border:1px solid ${RP_TIER_COLORS[t]}44;border-radius:6px;padding:2px 8px;font-size:11px;font-weight:700">T${t}</span>`;
}

function showWikiSection(section, btn) {
    ['factions','houses','players'].forEach(s => {
        document.getElementById('wikiSection'+s.charAt(0).toUpperCase()+s.slice(1)).style.display = s===section?'':'none';
    });
    document.querySelectorAll('.wiki-tab').forEach(t => {
        t.style.background = t===btn ? 'var(--card-hover)' : 'none';
        t.style.color      = t===btn ? 'var(--text)' : 'var(--muted)';
        t.style.border     = t===btn ? '1px solid var(--border2)' : '1px solid var(--border)';
    });
}

// close region / city popups on body click
document.addEventListener('click', e => {
    const rp = document.getElementById('regionPopup');
    if (rp && rp.style.display !== 'none' && !rp.contains(e.target) && !e.target.closest('[id^="rgn_"]') && !e.target.closest('.map-legend-item')) {
        closeRegionPopup();
    }
    const cp = document.getElementById('cityPopup');
    if (cp && cp.style.display !== 'none' && !cp.contains(e.target)) {
        closeCityPopup();
    }
});

function switchView(view) {
    document.getElementById('rankingsView').style.display     = view === 'rankings'     ? '' : 'none';
    document.getElementById('newsView').style.display         = view === 'news'         ? '' : 'none';
    document.getElementById('profileView').style.display      = view === 'profile'      ? '' : 'none';
    document.getElementById('mapView').style.display          = view === 'map'          ? '' : 'none';
    document.getElementById('houseDetailView').style.display  = view === 'houseDetail'  ? '' : 'none';
    document.getElementById('factionDetailView').style.display = view === 'factionDetail' ? '' : 'none';

    closeRegionPopup();
    closeCityPopup();

    const sw = document.getElementById('searchWrap');
    sw.style.visibility    = view === 'rankings' ? '' : 'hidden';
    sw.style.pointerEvents = view === 'rankings' ? '' : 'none';

    const anim = (id) => {
        const el = document.getElementById(id);
        if (!el) return;
        el.style.animation = 'none'; void el.offsetWidth;
        el.style.animation = 'fadeUp .3s ease both';
    };
    if (view === 'news')     { anim('newsView'); }
    if (view === 'rankings') { anim('rankingsView'); }
    if (view === 'map')      { anim('mapView'); renderMap(); }
}

// ═══════════════ WIDGETS ═══════════════

function renderWidgets() {
    const sorted   = getSorted();
    const risers   = sorted.filter(p => p.change > 0).sort((a,b) => b.change - a.change).slice(0,3);
    const droppers = sorted.filter(p => p.change < 0).sort((a,b) => a.change - b.change).slice(0,3);
    const row = document.getElementById('widgetsRow');
    if (!row) return;
    const entryHTML = (p, type) => {
        const rank = sorted.indexOf(p) + 1;
        const sign = type === 'up' ? `↑ +${p.change}` : `↓ ${p.change}`;
        return `<div class="widget-entry">
            <span class="widget-rank">#${rank}</span>
            <img class="widget-av"
                 src="https://mc-heads.net/avatar/${enc(p.username)}/26"
                 onerror="this.onerror=null;this.src='https://minotar.net/helm/${enc(p.username)}/26'" alt="">
            <span class="widget-name">${esc(p.username)}</span>
            <span class="widget-badge ${type}">${sign}</span>
        </div>`;
    };

    row.innerHTML = `
        <div class="widget">
            <div class="widget-title green">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                Biggest Risers
            </div>
            ${risers.length ? risers.map(p => entryHTML(p,'up')).join('') : '<div class="widget-empty">Нет данных</div>'}
        </div>
        <div class="widget">
            <div class="widget-title red">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="23 18 13.5 8.5 8.5 13.5 1 6"/><polyline points="17 18 23 18 23 12"/></svg>
                Biggest Drops
            </div>
            ${droppers.length ? droppers.map(p => entryHTML(p,'down')).join('') : '<div class="widget-empty">Нет данных</div>'}
        </div>`;
}

// ═══════════════ NEWS ═══════════════

function renderNews() {
    const list = document.getElementById('newsList');
    if (!list) return;
    if (!news.length) { list.innerHTML = '<div class="no-res">Новостей пока нет 📭</div>'; return; }
    list.innerHTML = `<div class="news-grid">${
        [...news].reverse().map(n => `
        <div class="news-card">
            <div class="news-meta">${esc(n.date)}</div>
            <div class="news-title">${esc(n.title)}</div>
            <div class="news-body">${esc(n.body)}</div>
        </div>`).join('')
    }</div>`;
}

// ═══════════════ PROFILE VIEW ═══════════════

let currentProfileId = null;

function openDetail(id) {
    const p = players.find(x => x.id === id);
    if (!p) return;
    currentProfileId = id;
    const rank = getRank(id);
    const bClass = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : 'def';

    const av = document.getElementById('profileAvatar');
    av.src = `https://mc-heads.net/body/${enc(p.username)}/200`;
    av.onerror = () => { av.src = `https://mc-heads.net/avatar/${enc(p.username)}/200`; av.onerror = null; };
    av.alt = p.username;

    const ovl = document.getElementById('profileRankOvl');
    ovl.className = `profile-rank-ovl ${bClass}`;
    ovl.textContent = rank;

    document.getElementById('profileName').textContent = p.username;

    const chBadge = document.getElementById('profileChangeBadge');
    chBadge.innerHTML = p.change > 0
        ? `<div class="change-badge ch-up">↑ +${p.change}</div>`
        : p.change < 0
        ? `<div class="change-badge ch-down">↓ ${p.change}</div>`
        : `<div class="change-badge ch-same">— 0</div>`;

    document.getElementById('profileSub').textContent = p.title + (p.subtitle ? ' · ' + p.subtitle : '');

    const attrsEl = document.getElementById('profileAttrs');
    const attrs = p.attrs || [];
    const tagChip = p.tag
        ? `<span class="attr-tag" style="background:${p.tagColor}22;color:${p.tagColor};border-color:${p.tagColor}44">${esc(p.tag)}</span>`
        : '';
    attrsEl.innerHTML = tagChip + attrs.map(a =>
        `<span class="attr-tag" style="background:${a.color}22;color:${a.color};border-color:${a.color}44">${esc(a.label)}</span>`
    ).join('');

    document.querySelectorAll('.profile-tab').forEach((t, i) => t.classList.toggle('active', i === 0));
    switchView('profile');

    // Entrance animations
    const pv = document.getElementById('profileView');
    pv.style.animation = 'none'; void pv.offsetWidth;
    pv.style.animation = 'slideRight .35s cubic-bezier(.25,.46,.45,.94) both';

    [['profileAvatar',0],['profileName',.06],['profileSub',.12],['profileAttrs',.18],['profileChangeBadge',.08]].forEach(([id,d])=>{
        const el = document.getElementById(id);
        if (!el) return;
        el.style.animation = 'none'; void el.offsetWidth;
        el.style.animation = `fadeUp .4s ease ${d}s both`;
    });

    const glowAnim = bClass==='gold'   ? ',goldPulse 2.4s ease-in-out .55s infinite'
                   : bClass==='silver' ? ',silverPulse 2.4s ease-in-out .55s infinite'
                   : bClass==='bronze' ? ',bronzePulse 2.4s ease-in-out .55s infinite' : '';
    ovl.style.animation = 'none'; void ovl.offsetWidth;
    ovl.style.animation = `popIn .5s cubic-bezier(.34,1.56,.64,1) .1s both${glowAnim}`;

    renderProfileTab('overview', p, rank);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function switchProfileTab(tab, btn) {
    document.querySelectorAll('.profile-tab').forEach(t => t.classList.remove('active'));

    switchView('rankings');

}

function buildRankChart(history) {
    if (!document.getElementById('chartTip')) {
        const tip = document.createElement('div');
        tip.id = 'chartTip';
        tip.style.cssText = 'display:none;position:fixed;background:#161b22;border:1px solid #2d333b;border-radius:9px;padding:10px 14px;font-family:Inter,sans-serif;pointer-events:none;z-index:99999;box-shadow:0 8px 24px rgba(0,0,0,.5);transition:opacity .15s ease';
        document.body.appendChild(tip);
    }
    const W = 700, H = 220;
    const PAD = { top: 24, right: 24, bottom: 36, left: 48 };
    const cW = W - PAD.left - PAD.right, cH = H - PAD.top - PAD.bottom;
    const n  = history.length;

    const ranks  = history.map(h => h.rank);
    const minR   = Math.min(...ranks), maxR = Math.max(...ranks);
    const pad    = Math.max(1, Math.round((maxR - minR) * 0.2));
    const minY   = Math.max(1, minR - pad), maxY = maxR + pad;
    const rangeY = maxY - minY || 2;

    const px = i => PAD.left + (n > 1 ? (i / (n - 1)) * cW : cW / 2);
    const py = r => PAD.top  + ((r - minY) / rangeY) * cH;

    const pts = history.map((h, i) => `${px(i).toFixed(1)},${py(h.rank).toFixed(1)}`).join(' ');

    const fillPts = n > 1
        ? `${pts} ${px(n-1).toFixed(1)},${(PAD.top+cH).toFixed(1)} ${PAD.left.toFixed(1)},${(PAD.top+cH).toFixed(1)}`
        : '';

    const yTicks = minR === maxR ? [minR] : [minR, Math.round((minR+maxR)/2), maxR];
    const grid = [...new Set(yTicks)].map(r =>
        `<line x1="${PAD.left}" y1="${py(r).toFixed(1)}" x2="${W-PAD.right}" y2="${py(r).toFixed(1)}" stroke="#21262d" stroke-width="1"/>
         <text x="${PAD.left-8}" y="${(py(r)+4).toFixed(1)}" text-anchor="end" fill="#7d8590" font-size="11" font-family="Inter,sans-serif">#${r}</text>`
    ).join('');

    const xStep = n <= 8 ? 1 : Math.ceil(n / 8);
    const xLabels = history.map((h, i) =>
        (i % xStep === 0 || i === n-1)
            ? `<text x="${px(i).toFixed(1)}" y="${H-6}" text-anchor="middle" fill="#7d8590" font-size="11" font-family="Inter,sans-serif">${i+1}</text>`
            : ''
    ).join('');

    const circles = history.map((h, i) =>
        `<circle cx="${px(i).toFixed(1)}" cy="${py(h.rank).toFixed(1)}" r="5"
             fill="#58a6ff" stroke="#0d1117" stroke-width="2.5"
             style="cursor:pointer;transition:r .15s ease,filter .15s ease;animation:popIn .4s cubic-bezier(.34,1.56,.64,1) ${(.15+i*.08).toFixed(2)}s both"
             onmouseenter="this.setAttribute('r','8');this.style.filter='drop-shadow(0 0 8px rgba(88,166,255,.9))';showChartTip(this,'${h.date}',${h.rank},${h.points})"
             onmouseleave="this.setAttribute('r','5');this.style.filter='none';hideChartTip()"/>`
    ).join('');

    return `<div style="position:relative">
        <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible;display:block">
            ${fillPts ? `<polygon points="${fillPts}" fill="rgba(88,166,255,0.07)"/>` : ''}
            ${n > 1 ? `<polyline points="${pts}" fill="none" stroke="#58a6ff" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round" class="chart-anim"/>` : ''}
            ${grid}${xLabels}${circles}
        </svg>
    </div>`;
}

function showChartTip(circle, date, rank, pts) {
    let tt = document.getElementById('chartTip');
    if (!tt) {
        tt = document.createElement('div');
        tt.id = 'chartTip';
        tt.style.cssText = 'display:none;position:fixed;background:#161b22;border:1px solid #2d333b;border-radius:9px;padding:10px 14px;font-family:Inter,sans-serif;pointer-events:none;z-index:99999;box-shadow:0 8px 24px rgba(0,0,0,.5);transition:opacity .15s ease';
        document.body.appendChild(tt);
    }
    tt.innerHTML = `<div style="color:#7d8590;font-size:11px;margin-bottom:5px">${date}</div>
        <div style="font-weight:700;font-size:14px;margin-bottom:3px">#${rank} позиция</div>
        <div style="color:#58a6ff;font-size:13px">${parseInt(pts).toLocaleString('ru')} очков</div>`;
    tt.style.display = 'block';
    tt.style.opacity = '0';

    const svg = circle.ownerSVGElement;
    const ctm = svg.getScreenCTM();
    const pt  = svg.createSVGPoint();
    pt.x = parseFloat(circle.getAttribute('cx'));
    pt.y = parseFloat(circle.getAttribute('cy'));
    const sp = pt.matrixTransform(ctm);

    requestAnimationFrame(() => {
        const tw = tt.offsetWidth, th = tt.offsetHeight;
        let left = sp.x + 14;
        let top  = sp.y - th / 2;
        if (left + tw > window.innerWidth - 8) left = sp.x - tw - 14;
        if (top < 8) top = 8;
        if (top + th > window.innerHeight - 8) top = window.innerHeight - th - 8;
        tt.style.left    = left + 'px';
        tt.style.top     = top  + 'px';
        tt.style.opacity = '1';
    });
}

function moveChartTip() {}

function hideChartTip() {
    const tt = document.getElementById('chartTip');
    if (!tt) return;
    tt.style.opacity = '0';
    setTimeout(() => { tt.style.display = 'none'; }, 150);
}

function saveEdit() {
    const username = document.getElementById('e_user').value.trim();
    const title    = document.getElementById('e_title').value.trim();
    if (!username || !title) { alert('Заполните обязательные поля (ник и титул)!'); return; }

    const tierVal = document.getElementById('e_tier').value;
    const data = {
        username,
        title,
        subtitle:  document.getElementById('e_sub').value.trim(),
        points:    parseInt(document.getElementById('e_pts').value) || 0,
        tag:       document.getElementById('e_tag').value.trim().toUpperCase(),
        tagColor:  document.getElementById('e_color').value,
        attrs:     parseAttrs(document.getElementById('e_attrs').value),
        bio:       document.getElementById('e_bio').value.trim(),
        character: document.getElementById('e_char').value.trim(),
        factionId: document.getElementById('e_faction').value || null,
        house:     document.getElementById('e_house').value.trim(),
        rpTier:    tierVal ? parseInt(tierVal) : null,
    };

    const today = new Date().toLocaleDateString('ru-RU');
    if (editId) {
        // Снимок рангов И очков всех игроков ДО изменения
        const oldRanks  = {};
        const oldPtsMap = {};
        getSorted().forEach((p, idx) => {
            oldRanks[p.id]  = idx + 1;
            oldPtsMap[p.id] = p.points;
        });

        const i             = players.findIndex(p => p.id === editId);
        const oldPts        = players[i].points;
        players[i]          = { ...players[i], ...data };
        const pointsChanged = data.points !== oldPts;

        // Пересчитываем change для ВСЕХ + добавляем историю вытесненным игрокам
        getSorted().forEach((p, idx) => {
            const ni       = players.findIndex(x => x.id === p.id);
            const newRankP = idx + 1;
            const oldRankP = oldRanks[p.id] ?? newRankP;

            if (pointsChanged && oldRankP !== newRankP) players[ni].change = oldRankP - newRankP;

            if (pointsChanged && oldRankP !== newRankP && p.id !== editId) {
                if (!players[ni].history) players[ni].history = [];
                if (players[ni].history.length === 0) {
                    players[ni].history.push({ date: today, points: oldPtsMap[p.id], rank: oldRankP });
                }
                players[ni].history.push({ date: today, points: players[ni].points, rank: newRankP });
            }
        });

        // История для самого редактируемого игрока
        if (pointsChanged) {
            if (!players[i].history) players[i].history = [];
            if (players[i].history.length === 0) {
                players[i].history.push({ date: today, points: oldPts, rank: oldRanks[editId] });
            }
            players[i].history.push({ date: today, points: data.points, rank: getRank(editId) });
        }
    } else {
        const newP = { id: nextId(), ...data, change: 0, history: [] };
        players.push(newP);
        newP.history.push({ date: today, points: newP.points, rank: getRank(newP.id) });
    }

    save(); render(); renderAdmin();
    closeOverlay('editOverlay');
}

function esc(s='') { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function enc(s='') { return encodeURIComponent(s); }

function animCount(id, target, duration = 900) {
    const el = document.getElementById(id);
    if (!el) return;
    let start = null;
    const tick = ts => {
        if (!start) start = ts;
        const p = Math.min((ts - start) / duration, 1);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = Math.round(eased * target).toLocaleString('ru');
        if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
}

function parseAttrs(str) {
    if (!str.trim()) return [];
    return str.split(',').map(s => {
        const idx = s.lastIndexOf(':');
        if (idx < 1) return null;
        return { label: s.slice(0, idx).trim(), color: s.slice(idx + 1).trim() };
    }).filter(Boolean);
}

// SVG group IDs matching the Westeros SVG file
const SVG_ID_MAP = {
    beyond_wall:  'beyond-the-wall',
    north:        'north',
    iron_islands: 'iron-islands',
    westerlands:  'westerlands',
    riverlands:   'riverlands',
