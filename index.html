    dorne:        'dorne',
};

let _mapSvgEl = null; // cached loaded SVG element

function renderMap() {
    const container = document.getElementById('mapContainer');
    if (!_mapSvgEl) {
        const svgText = window.WESTEROS_SVG && (typeof window.WESTEROS_SVG === 'string' ? window.WESTEROS_SVG : window.WESTEROS_SVG.value);
        if (!svgText) {
            container.innerHTML = `<div style="padding:40px;color:var(--red)">Карта не загружена (westeros-data.js не найден)</div>`;
            return;
        }
        const parser = new DOMParser();
        const doc = parser.parseFromString(svgText, 'image/svg+xml');
        _mapSvgEl = doc.querySelector('svg');
        // Remove browser tooltip (SVG <title> elements)
        _mapSvgEl.querySelectorAll('title').forEach(t => t.remove());
        _mapSvgEl.id = 'westerosMap';
        _mapSvgEl.setAttribute('width',  '100%');
        _mapSvgEl.setAttribute('height', '100%');
        // Keep meet so the SVG renders at a predictable size we can math against
        _mapSvgEl.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        _mapSvgEl.style.cssText = 'display:block;position:absolute;top:0;left:0;width:100%;height:100%;overflow:visible';

        // Dark theme override
        const styleEl = _mapSvgEl.querySelector('style');
        if (styleEl) styleEl.textContent = `
            * { stroke-linejoin: round; stroke-linecap: round; }
            #guides, #essos, #coordinates, #borders { display: none; }
            .ocean, .lake { fill: #060e18; }
            #bleeding-sea, #sea-of-sighs, #poison-sea { fill: #060e18; }
            .land { stroke: #1e3a50; stroke-width: 5; }
            .river { stroke: #0d2038; stroke-width: 4; fill: none; }
            #wall { stroke: #6aaad8; stroke-width: 18; opacity: 0.9; }
        `;

        // Color + interactivity per region
        MAP_REGIONS.forEach(region => {
            const svgId = SVG_ID_MAP[region.id];
            if (!svgId) return;
            const el = _mapSvgEl.querySelector('#' + svgId);
            if (!el) return;
            const r = getRegionData(region.id);
            const paths = el.tagName.toLowerCase() === 'g' ? el.querySelectorAll('path') : [el];
            paths.forEach(p => {
                p.style.fill = r.color;
                p.style.transition = 'fill .18s ease';
            });
            el.style.cursor = 'pointer';
            let dragMoved = false;
            el.addEventListener('mousedown', () => { dragMoved = false; });
            el.addEventListener('mousemove', () => { dragMoved = true; });
            el.addEventListener('mouseenter', () => _hoverEl(el, region, true));
            el.addEventListener('mouseleave', () => _hoverEl(el, region, false));
            el.addEventListener('click', e => {
                if (dragMoved) return;
                e.stopPropagation();
                showRegionPopup(region.id, e.clientX, e.clientY);
            });
        });
    }

    // ── City markers (injected as SVG group, updated each render) ───────────
    let citiesG = _mapSvgEl.getElementById('mapCities');
    if (!citiesG) {
        citiesG = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        citiesG.id = 'mapCities';
        _mapSvgEl.appendChild(citiesG);
    }
    citiesG.innerHTML = '';
    const ns = 'http://www.w3.org/2000/svg';
    MAP_CITIES.forEach(city => {
        const sorted = getSorted();
        // Capital inherits region leader automatically
        const leaderId = city.isCapital
            ? (mapData[city.regionId] || cityData[city.id] || null)
            : (cityData[city.id] || null);
        const leader = leaderId ? players.find(p => p.id == leaderId) : null;
        const rank   = leader ? sorted.indexOf(leader) + 1 : null;

        const g = document.createElementNS(ns, 'g');
        g.style.cursor = 'pointer';

        // Dot
        const circle = document.createElementNS(ns, 'circle');
        circle.setAttribute('cx', city.x);
        circle.setAttribute('cy', city.y);
        circle.setAttribute('r',  city.isCapital ? '18' : '12');
        circle.setAttribute('fill', leader ? '#58a6ff' : '#8b949e');
        circle.setAttribute('stroke', city.isCapital ? '#d4a017' : '#c8d1da');
        circle.setAttribute('stroke-width', city.isCapital ? '6' : '4');
        circle.style.transition = 'fill .18s';
        g.appendChild(circle);

        // Label
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('x', city.x);
        text.setAttribute('y', city.y + (city.isCapital ? 38 : 30));
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('font-family', 'Inter, sans-serif');
        text.setAttribute('font-size',   city.isCapital ? '36' : '30');
        text.setAttribute('font-weight', city.isCapital ? '700' : '600');
        text.setAttribute('fill', city.isCapital ? '#e6b84a' : '#c8d1da');
        text.textContent = city.name;
        g.appendChild(text);

        // Leader sublabel (if assigned)
        if (leader) {
            const sub = document.createElementNS(ns, 'text');
            sub.setAttribute('x', city.x);
            sub.setAttribute('y', city.y + (city.isCapital ? 72 : 60));
            sub.setAttribute('text-anchor', 'middle');
            sub.setAttribute('font-family', 'Inter, sans-serif');
            sub.setAttribute('font-size',   '26');
            sub.setAttribute('fill', '#58a6ff');
            sub.textContent = `#${rank} ${leader.username}`;
            g.appendChild(sub);
        }

        let dragMoved2 = false;
        g.addEventListener('mousedown', () => { dragMoved2 = false; });
        g.addEventListener('mousemove', () => { dragMoved2 = true;  });
        g.addEventListener('mouseenter', () => { circle.setAttribute('fill', leader ? '#79c0ff' : '#adbac7'); });
        g.addEventListener('mouseleave', () => { circle.setAttribute('fill', leader ? '#58a6ff' : '#8b949e'); });
        g.addEventListener('click', e => {
            if (dragMoved2) return;
            e.stopPropagation();
            showCityPopup(city.id, e.clientX, e.clientY);
        });
        citiesG.appendChild(g);
    });

    // Mount SVG into wrapper
    const wrapper = document.createElement('div');
    wrapper.id = 'mapPanZoom';
    wrapper.style.cssText = 'width:100%;height:100%;overflow:hidden;cursor:grab;background:#060e18;position:relative;user-select:none;touch-action:none';
    wrapper.appendChild(_mapSvgEl);
    container.innerHTML = '';
    container.appendChild(wrapper);

    _setupPanZoom(wrapper, _mapSvgEl);
    buildMapLegend();
}

function _hoverEl(el, region, on) {
    const r = getRegionData(region.id);
    const paths = el.tagName.toLowerCase() === 'g' ? el.querySelectorAll('path') : [el];
    paths.forEach(p => {
        p.style.fill   = on ? r.hoverColor : r.color;
        p.style.filter = on ? 'brightness(1.4) drop-shadow(0 0 14px rgba(88,166,255,0.45))' : 'none';
    });
}

function _setupPanZoom(wrapper, svg) {
    // SVG viewBox: 3080×4740 (portrait), preserveAspectRatio=xMidYMid meet.
    // At CSS scale=1, SVG content renders height-limited in a landscape container:
    //   meetScale = ch/4740, contentW = 3080*(ch/4740), centered at x=(cw-contentW)/2
    // We zoom in (CSS scale) so the content fills the full container WIDTH,
    // then pan to centre on viewBox y≈2200 (mid-Westeros, Riverlands / Westerlands area).
    const cw = wrapper.clientWidth  || window.innerWidth;
    const ch = wrapper.clientHeight || window.innerHeight;

    const meetScale  = Math.min(cw / 3080, ch / 4740);   // base SVG render scale
    const contentW   = 3080 * meetScale;                   // rendered width at CSS scale=1
    const contentH   = 4740 * meetScale;                   // rendered height at CSS scale=1
    const contentX   = (cw - contentW) / 2;               // SVG-element x of content left edge
    const contentY   = (ch - contentH) / 2;               // SVG-element y of content top edge

    // CSS zoom so Westeros content fills the container width
    const initScale  = cw / contentW;
    // X: shift so content left edge lands at wrapper x=0
    const initTx     = -(contentX * initScale);
    // Y: center viewBox y=2200 (mid-Westeros) on screen
    const vy         = 2700;   // target viewBox y to show at screen centre (Riverlands/Westerlands)
    const initTy     = ch / 2 - (contentY + vy * meetScale) * initScale;

    let scale = initScale, tx = initTx, ty = initTy;
    let dragging = false, ox = 0, oy = 0, moved = false;

    svg.style.transformOrigin = '0 0';
    const apply = () => { svg.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`; };
    apply();

    wrapper.addEventListener('wheel', e => {
        e.preventDefault();
        const rect = wrapper.getBoundingClientRect();
        const mx = e.clientX - rect.left, my = e.clientY - rect.top;
        const factor = e.deltaY < 0 ? 1.12 : 0.9;
        const ns = Math.min(6, Math.max(initScale * 0.9, scale * factor));
        tx -= (mx - tx) * (ns / scale - 1);
        ty -= (my - ty) * (ns / scale - 1);
        scale = ns;
        apply();
    }, { passive: false });

    wrapper.addEventListener('mousedown', e => {
        if (e.button !== 0) return;
        dragging = true; moved = false;
        ox = e.clientX - tx; oy = e.clientY - ty;
        wrapper.style.cursor = 'grabbing';
    });
    window.addEventListener('mousemove', e => {
        if (!dragging) return;
        const dx = e.clientX - ox - tx, dy = e.clientY - oy - ty;
        if (Math.abs(dx) + Math.abs(dy) > 2) moved = true;
        tx = e.clientX - ox; ty = e.clientY - oy;
        apply();
    });
    window.addEventListener('mouseup', () => {
        dragging = false;
        wrapper.style.cursor = 'grab';
    });

    // ── Touch support ─────────────────────────────────────────────────────────
    let lastTouchDist = null;
    let lastTouchMid  = null;

    wrapper.addEventListener('touchstart', e => {
        // No preventDefault here — keeps synthetic click events alive for region/city taps
        if (e.touches.length === 1) {
            dragging = true; moved = false;
            ox = e.touches[0].clientX - tx;
            oy = e.touches[0].clientY - ty;
            lastTouchDist = null;
        } else if (e.touches.length === 2) {
            dragging = false;
            lastTouchDist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            lastTouchMid = {
                x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
            };
        }
    }, { passive: true });

    wrapper.addEventListener('touchmove', e => {
        e.preventDefault(); // prevent page scroll while panning/pinching
        if (e.touches.length === 1 && dragging) {
            const dx = e.touches[0].clientX - ox - tx;
            const dy = e.touches[0].clientY - oy - ty;
            if (Math.abs(dx) + Math.abs(dy) > 3) moved = true;
            tx = e.touches[0].clientX - ox;
            ty = e.touches[0].clientY - oy;
            apply();
        } else if (e.touches.length === 2 && lastTouchDist !== null) {
            const dist = Math.hypot(
                e.touches[0].clientX - e.touches[1].clientX,
                e.touches[0].clientY - e.touches[1].clientY
            );
            const mid = {
                x: (e.touches[0].clientX + e.touches[1].clientX) / 2,
                y: (e.touches[0].clientY + e.touches[1].clientY) / 2,
            };
            const rect  = wrapper.getBoundingClientRect();
            const factor = dist / lastTouchDist;
            const px = mid.x - rect.left, py = mid.y - rect.top;
            const ns = Math.min(6, Math.max(initScale * 0.9, scale * factor));
            tx += (mid.x - lastTouchMid.x);
            ty += (mid.y - lastTouchMid.y);
            tx -= (px - tx) * (ns / scale - 1);
            ty -= (py - ty) * (ns / scale - 1);
            scale = ns;
            apply();
            lastTouchDist = dist;
            lastTouchMid  = mid;
        }
    }, { passive: false });

    wrapper.addEventListener('touchend', e => {
        if (e.touches.length === 0) {
            dragging = false;
            lastTouchDist = null;
            // Close legend on map tap (mobile)
            if (moved) {
                const panel = document.getElementById('mapLegendFloat');
                if (panel) panel.classList.remove('open');
            }
        } else if (e.touches.length === 1) {
            lastTouchDist = null;
            dragging = true;
            ox = e.touches[0].clientX - tx;
            oy = e.touches[0].clientY - ty;
        }
    }, { passive: false });

    // Zoom buttons
    const btnWrap = document.createElement('div');
    btnWrap.style.cssText = 'position:absolute;bottom:20px;left:20px;display:flex;flex-direction:column;gap:6px;z-index:60';
    const mkBtn = (label, fn) => {
        const b = document.createElement('button');
        b.textContent = label;
        b.style.cssText = 'width:36px;height:36px;background:rgba(22,27,34,0.92);border:1px solid var(--border2);border-radius:9px;color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;backdrop-filter:blur(8px)';
        b.onmouseenter = () => b.style.background = 'var(--card-hover)';
        b.onmouseleave = () => b.style.background = 'rgba(22,27,34,0.92)';
        b.onclick = fn;
        return b;
    };
    btnWrap.appendChild(mkBtn('+', () => { scale = Math.min(6, scale * 1.2); apply(); }));
    btnWrap.appendChild(mkBtn('−', () => { scale = Math.max(initScale * 0.9, scale / 1.2); apply(); }));
    btnWrap.appendChild(mkBtn('⌂', () => { scale = initScale; tx = initTx; ty = initTy; apply(); }));
    wrapper.appendChild(btnWrap);

    // ── Expose animated navigation (used by holding chips) ──────────────────
    // svgX, svgY = coordinates in SVG viewBox space; targetZoom = desired CSS scale
    _mapNavFn = (svgX, svgY, targetZoom, onDone) => {
        const cw       = wrapper.clientWidth  || window.innerWidth;
        const ch       = wrapper.clientHeight || window.innerHeight;
        const toScale  = Math.min(6, Math.max(initScale * 0.9, targetZoom));
        const toTx     = cw / 2 - (contentX + svgX * meetScale) * toScale;
        const toTy     = ch / 2 - (contentY + svgY * meetScale) * toScale;
        const fromScale = scale, fromTx = tx, fromTy = ty;
        const dur  = 720;
        const t0   = performance.now();
        const ease = t => t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2, 3) / 2; // easeInOutCubic
        const step = now => {
            const t = Math.min((now - t0) / dur, 1);
            const e = ease(t);
            scale = fromScale + (toScale - fromScale) * e;
            tx    = fromTx    + (toTx    - fromTx   ) * e;
            ty    = fromTy    + (toTy    - fromTy   ) * e;
            apply();
            if (t < 1) requestAnimationFrame(step);
            else if (onDone) onDone();
        };
        requestAnimationFrame(step);
    };
}

function toggleMapLegend() {
    const panel  = document.getElementById('mapLegendFloat');
    const toggle = document.getElementById('mapLegendToggle');
    const isOpen = panel.classList.contains('open');
    panel.classList.toggle('open', !isOpen);
    toggle.style.opacity = isOpen ? '1' : '0.5';
}

// ── Programmatic map navigation ───────────────────────────────────────────────
function _goToMap(svgX, svgY, zoom, popupFn) {
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'map'));
    switchView('map');
    closeRegionPopup(); closeCityPopup();
    const attempt = (tries) => {
        if (_mapNavFn && _mapSvgEl) {
            _mapNavFn(svgX, svgY, zoom, () => { if (popupFn) popupFn(); });
        } else if (tries > 0) {
            setTimeout(() => attempt(tries - 1), 80);
        }
    };
    setTimeout(() => attempt(10), 60);
}

function navigateMapToRegion(regionId) {
    const getCenter = () => {
        const svgId = SVG_ID_MAP[regionId];
        const el = svgId && _mapSvgEl ? _mapSvgEl.querySelector('#' + svgId) : null;
        if (el) {
            try {
                const bb = el.getBBox();
                return { x: bb.x + bb.width / 2, y: bb.y + bb.height / 2 };
            } catch(e) {}
        }
        return null;
    };
    const go = () => {
        const c = getCenter();
        if (c) {
            _goToMap(c.x, c.y, 3.2, () => {
                showRegionPopup(regionId, window.innerWidth / 2, window.innerHeight / 2);
            });
        } else {
            _goToMap(1540, 2700, 2.0);
        }
    };
    // Switch to map first, then compute center after SVG is in DOM
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.tab === 'map'));
    switchView('map');
    closeRegionPopup(); closeCityPopup();
    const attempt = (tries) => {
        const c = getCenter();
        if (c && _mapNavFn) {
            _mapNavFn(c.x, c.y, 3.2, () => {
                showRegionPopup(regionId, window.innerWidth / 2, window.innerHeight / 2);
            });
        } else if (tries > 0) {
            setTimeout(() => attempt(tries - 1), 80);
        }
    };
    setTimeout(() => attempt(15), 60);
}

function navigateMapToCity(cityId) {
    const city = MAP_CITIES.find(c => c.id === cityId);
    if (!city) return;
    _goToMap(city.x, city.y, 4.5, () => {
        showCityPopup(cityId, window.innerWidth / 2, window.innerHeight / 2);
    });
}

function buildMapLegend() {
    const el = document.getElementById('mapLegend');
    if (!el) return;
    const sorted = getSorted();
    el.innerHTML = MAP_REGIONS.map(region => {
        const r = getRegionData(region.id);
        const leader = mapData[r.id] ? players.find(p => p.id == mapData[r.id]) : null;
        const rank = leader ? sorted.indexOf(leader) + 1 : null;
        return `<div class="map-legend-item"
            onmouseenter="hoverRegion('${r.id}',true)"
            onmouseleave="hoverRegion('${r.id}',false)"
            onclick="clickRegionById('${r.id}')">
            <div class="map-legend-dot" style="background:${r.strokeColor}"></div>
            <div class="map-legend-txt">
                <div class="map-legend-name">${r.emoji} ${r.name}</div>
                <div class="map-legend-sub ${leader ? 'assigned' : ''}">${leader ? `#${rank} ${esc(leader.username)}` : 'Нет лидера'}</div>
            </div>
        </div>`;
    }).join('');
}

function hoverRegion(id, on) {
    if (!_mapSvgEl) return;
    const r = MAP_REGIONS.find(x => x.id === id);
    if (!r) return;
    const svgId = SVG_ID_MAP[id];
    const el = _mapSvgEl.querySelector('#' + svgId);
    if (el) _hoverEl(el, r, on);
}

function clickRegionSvg(event, id) {
    event.stopPropagation();
    showRegionPopup(id, event.clientX, event.clientY);
}

function clickRegionById(id) {
    if (!_mapSvgEl) return;
    const svgId = SVG_ID_MAP[id];
    const el = svgId ? _mapSvgEl.querySelector('#' + svgId) : null;
    if (el) {
        const rect = el.getBoundingClientRect();
        showRegionPopup(id, rect.left + rect.width / 2, rect.top + rect.height / 2);
    } else {
        showRegionPopup(id, window.innerWidth / 2, window.innerHeight / 2);
    }
}

function showRegionPopup(id, cx, cy) {
    const r = getRegionData(id);
    if (!r) return;
    const popup  = document.getElementById('regionPopup');
    const sorted = getSorted();
    const leaderId = mapData[r.id];
    const leader = leaderId ? players.find(p => p.id == leaderId) : null;
    const rank   = leader ? sorted.indexOf(leader) + 1 : null;

    const leaderHTML = leader
        ? `<div class="rp-leader" onclick="closeRegionPopup();switchView('profile');openDetail(${leader.id})">
            <img class="rp-leader-av"
                src="https://mc-heads.net/avatar/${enc(leader.username)}/44"
                onerror="this.src='https://minotar.net/helm/${enc(leader.username)}/44'" alt="">
            <div style="flex:1;min-width:0">
                <div class="rp-leader-name">${esc(leader.username)}</div>
                <div class="rp-leader-rank">#${rank} в рейтинге</div>
                <div class="rp-leader-pts">${Number(leader.points).toLocaleString('ru')} очков</div>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.2"><path d="m9 18 6-6-6-6"/></svg>
        </div>`
        : `<div class="rp-no-leader">Лидер не назначен</div>`;

    popup.innerHTML = `
        <button class="rp-close" onclick="closeRegionPopup()">✕</button>
        <div class="rp-header">
            <div class="rp-house">${r.emoji} ${r.house}</div>
            <div class="rp-name">${r.name}</div>
            <div class="rp-capital">🏰 ${r.capital}</div>
        </div>
        <hr class="rp-divider">
        <div class="rp-section-label">Лидер фракции</div>
        ${leaderHTML}`;

    popup.style.display = 'block';
    activeRegionId = id;

    requestAnimationFrame(() => {
        const pw = popup.offsetWidth, ph = popup.offsetHeight;
        let left = cx + 18, top = cy - ph / 2;
        if (left + pw > window.innerWidth  - 12) left = cx - pw - 18;
        if (top < 12) top = 12;
        if (top + ph > window.innerHeight - 12) top = window.innerHeight - ph - 12;
        popup.style.left = left + 'px';
        popup.style.top  = top  + 'px';
        popup.style.animation = 'popIn .2s cubic-bezier(.34,1.56,.64,1) both';
    });
}

function closeRegionPopup() {
    const popup = document.getElementById('regionPopup');
    if (popup) popup.style.display = 'none';
    activeRegionId = null;
}

function closeCityPopup() {
    const popup = document.getElementById('cityPopup');
    if (popup) popup.style.display = 'none';
    activePopupId = null;
}

// ── City placement / edit mode ─────────────────────────────────────────────────
let _placementCoords = null;  // { x, y } in SVG viewBox space after click
let _editingCityId   = null;  // null = new city, string = editing existing

function _regionOptions(selectedId) {
    return MAP_REGIONS.map(r =>
        `<option value="${r.id}" ${r.id === selectedId ? 'selected' : ''}>${r.emoji} ${r.name}</option>`
    ).join('');
}

function _buildPlacementForm(cx, cy) {
    const city    = _editingCityId ? MAP_CITIES.find(c => c.id === _editingCityId) : null;
    const isEdit  = !!city;
    const needPin = !isEdit || !_placementCoords; // still needs a map click?
    const inputStyle = 'width:100%;box-sizing:border-box;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--text);font-family:Inter,sans-serif;font-size:13px;padding:7px 10px;outline:none';

    const form = document.getElementById('placementForm');
    form.innerHTML = `
        <div style="font-weight:700;font-size:14px;margin-bottom:14px">${isEdit ? '✏️ Редактировать город' : '📍 Новый город'}</div>
        <div style="margin-bottom:10px">
            <label style="font-size:11.5px;color:var(--muted);display:block;margin-bottom:4px">Название</label>
            <input id="pfName" placeholder="Например: Белая Гавань" value="${isEdit ? esc(city.name) : ''}" style="${inputStyle}">
        </div>
        <div style="margin-bottom:10px">
            <label style="font-size:11.5px;color:var(--muted);display:block;margin-bottom:4px">Фракция</label>
            <select id="pfRegion" style="${inputStyle.replace('border-radius:7px','border-radius:7px').replace('padding:7px 10px','padding:6px 10px')}">${_regionOptions(city ? city.regionId : MAP_REGIONS[0].id)}</select>
        </div>
        <div style="margin-bottom:14px;display:flex;align-items:center;gap:8px">
            <input type="checkbox" id="pfCapital" ${isEdit && city.isCapital ? 'checked' : ''} style="accent-color:var(--accent);width:14px;height:14px">
            <label for="pfCapital" style="font-size:12.5px;cursor:pointer">Столица фракции</label>
        </div>
        ${isEdit ? `
        <div style="margin-bottom:14px">
            <div style="font-size:11.5px;color:var(--muted);margin-bottom:6px">Положение на карте</div>
            <div style="font-size:11.5px;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:6px 10px;margin-bottom:6px" id="pfCoordsDisplay">
                ${_placementCoords ? `x=${_placementCoords.x}, y=${_placementCoords.y}` : `x=${city.x}, y=${city.y} (текущее)`}
            </div>
            <button onclick="startReposition()" style="width:100%;background:rgba(88,166,255,0.1);border:1px solid rgba(88,166,255,0.3);border-radius:7px;color:#79c0ff;font-family:Inter,sans-serif;font-size:12px;padding:6px;cursor:pointer">📍 Переместить на карте</button>
        </div>` : ''}
        <div style="display:flex;gap:8px">
            <button onclick="cancelPlacement()" style="flex:1;background:var(--bg);border:1px solid var(--border2);border-radius:7px;color:var(--muted);font-family:Inter,sans-serif;font-size:12px;padding:7px;cursor:pointer">Отмена</button>
            <button onclick="confirmPlacement()" style="flex:2;background:var(--accent);border:none;border-radius:7px;color:#fff;font-family:Inter,sans-serif;font-size:12px;font-weight:600;padding:7px;cursor:pointer">${isEdit ? 'Сохранить' : 'Разместить'}</button>
        </div>`;

    form.style.display = 'block';
    requestAnimationFrame(() => {
        const fw = form.offsetWidth, fh = form.offsetHeight;
        let left = cx + 16, top = cy - fh / 2;
        if (left + fw > window.innerWidth  - 12) left = cx - fw - 16;
        if (top < 74) top = 74;
        if (top + fh > window.innerHeight - 12) top = window.innerHeight - fh - 12;
        form.style.left = left + 'px';
        form.style.top  = top  + 'px';
    });
    setTimeout(() => { const n = document.getElementById('pfName'); if (n) n.focus(); }, 60);
}

function startCityPlacement() {
    closeOverlay('adminOverlay');
    _editingCityId   = null;
    _placementCoords = null;
    _enterPlacementOverlay('Кликните на карте чтобы разместить город');
}

function startCityEdit(id) {
    closeOverlay('adminOverlay');
    _editingCityId   = id;
    _placementCoords = null;
    if (document.getElementById('mapView').style.display === 'none') switchView('map');
    _buildPlacementForm(window.innerWidth / 2, window.innerHeight / 2);
}

function startReposition() {
    // Called from within the edit form; saves current field values then enters placement mode
    document.getElementById('placementForm').style.display = 'none';
    _enterPlacementOverlay('Кликните новое положение города на карте');
}

function _enterPlacementOverlay(bannerText) {
    if (document.getElementById('mapView').style.display === 'none') switchView('map');
    document.getElementById('placementBannerText').textContent = bannerText;
    document.getElementById('placementOverlay').style.display = 'block';
    document.getElementById('placementOverlay').onclick = function(e) {
        if (e.target.tagName === 'BUTTON') return;
        if (!_mapSvgEl) return;
        try {
            const pt = _mapSvgEl.createSVGPoint();
            pt.x = e.clientX; pt.y = e.clientY;
            const svgP = pt.matrixTransform(_mapSvgEl.getScreenCTM().inverse());
            _placementCoords = { x: Math.round(svgP.x), y: Math.round(svgP.y) };
            document.getElementById('placementOverlay').style.display = 'none';
            _buildPlacementForm(e.clientX, e.clientY);
        } catch(err) { console.error('Placement coord error:', err); }
    };
}

function confirmPlacement() {
    const name = document.getElementById('pfName').value.trim();
    if (!name) { document.getElementById('pfName').style.borderColor = 'var(--red)'; return; }
    const regionId  = document.getElementById('pfRegion').value;
    const isCapital = document.getElementById('pfCapital').checked;

    if (_editingCityId) {
        const city = MAP_CITIES.find(c => c.id === _editingCityId);
        if (city) {
            city.name      = name;
            city.regionId  = regionId;
            city.isCapital = isCapital;
            if (_placementCoords) { city.x = _placementCoords.x; city.y = _placementCoords.y; }
        }
    } else {
        if (!_placementCoords) return;
        MAP_CITIES.push({ id: 'city_' + Date.now(), regionId, name, x: _placementCoords.x, y: _placementCoords.y, isCapital });
    }
    saveCitiesConfig();
    cancelPlacement();
    renderMap();
}

function cancelPlacement() {
    document.getElementById('placementOverlay').style.display = 'none';
    document.getElementById('placementForm').style.display = 'none';
    _placementCoords = null;
    _editingCityId   = null;
}

document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && document.getElementById('placementOverlay').style.display !== 'none') {
        cancelPlacement();
    }
});

function showCityPopup(id, cx, cy) {
    const city = MAP_CITIES.find(c => c.id === id);
    if (!city) return;
    const popup  = document.getElementById('cityPopup');
    const sorted = getSorted();

    // Capital auto-inherits region leader
    const leaderId = city.isCapital
        ? (mapData[city.regionId] || cityData[city.id] || null)
        : (cityData[city.id] || null);
    const leader = leaderId ? players.find(p => p.id == leaderId) : null;
    const rank   = leader ? sorted.indexOf(leader) + 1 : null;

    const region = getRegionData(city.regionId);

    const leaderHTML = leader
        ? `<div class="rp-leader" onclick="closeCityPopup();switchView('profile');openDetail(${leader.id})">
            <img class="rp-leader-av"
                src="https://mc-heads.net/avatar/${enc(leader.username)}/44"
                onerror="this.src='https://minotar.net/helm/${enc(leader.username)}/44'" alt="">
            <div style="flex:1;min-width:0">
                <div class="rp-leader-name">${esc(leader.username)}</div>
                <div class="rp-leader-rank">#${rank} в рейтинге</div>
                <div class="rp-leader-pts">${Number(leader.points).toLocaleString('ru')} очков</div>
            </div>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2.2"><path d="m9 18 6-6-6-6"/></svg>
        </div>`
        : `<div class="rp-no-leader">Лидер не назначен</div>`;

    const capitalNote = city.isCapital
        ? `<div style="font-size:11px;color:var(--muted);margin-top:6px;font-style:italic">Столица — лидер совпадает с лидером фракции</div>`
        : '';

    popup.innerHTML = `
        <button class="rp-close" onclick="closeCityPopup()">✕</button>
        <div class="rp-header">
            <div class="rp-house">${region ? region.emoji + ' ' + region.house : ''}</div>
            <div class="rp-name">${city.name}</div>
            <div class="rp-capital">${city.isCapital ? '👑 Столица · ' + region.name : '🏙 Город · ' + (region ? region.name : '')}</div>
        </div>
        <hr class="rp-divider">
        <div class="rp-section-label">Лидер города</div>
        ${leaderHTML}
        ${capitalNote}`;

    popup.style.display = 'block';
    activePopupId = id;

    requestAnimationFrame(() => {
        const pw = popup.offsetWidth, ph = popup.offsetHeight;
        let left = cx + 18, top = cy - ph / 2;
        if (left + pw > window.innerWidth  - 12) left = cx - pw - 18;
        if (top < 12) top = 12;
        if (top + ph > window.innerHeight - 12) top = window.innerHeight - ph - 12;
        popup.style.left = left + 'px';
        popup.style.top  = top  + 'px';
        popup.style.animation = 'popIn .2s cubic-bezier(.34,1.56,.64,1) both';
    });
}
</script>
</body>
</html>
